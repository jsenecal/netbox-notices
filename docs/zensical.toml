[project]
site_name = "NetBox Notices"
site_url = "https://jsenecal.github.io/netbox-notices/"
site_description = "Track maintenance and outage events across various NetBox models from vendors and internal sources"
site_author = "Jonathan Senecal"
repo_url = "https://github.com/jsenecal/netbox-notices"
repo_name = "jsenecal/netbox-notices"
edit_uri = "edit/main/docs/"
docs_dir = "."
nav = [
  { "Home" = "index.md" },
  { "Getting Started" = [
    { "Installation" = "installation.md" },
    { "Configuration" = "configuration.md" },
    { "Permissions" = "permissions.md" },
  ] },
  { "Events" = [
    { "Maintenance" = "events/maintenance.md" },
    { "Outages" = "events/outage.md" },
    { "Impact Tracking" = "events/impact.md" },
    { "Calendar and iCal Feed" = "events/calendar-and-ical.md" },
    { "Dashboard" = "events/dashboard.md" },
  ] },
  { "Outgoing Notifications" = [
    { "Overview" = "outgoing-notifications.md" },
    { "Templates" = "messaging/templates.md" },
    { "Recipient Discovery" = "messaging/recipient-discovery.md" },
    { "Approval Workflow" = "messaging/workflow.md" },
  ] },
  { "REST API" = "api/rest-api.md" },
  { "Automated Parsers" = [
    { "Using a parser" = "parsers.md" },
    { "AWS SNS and Lambda" = "parsers_sns_lambda.md" },
  ] },
  { "Integrations" = [
    { "AWS SES" = "integrations_aws_ses.md" },
  ] },
  { "Developer Guide" = [
    { "Architecture" = "developer/architecture.md" },
    { "Site and Location Resolvers" = "developer/resolvers.md" },
    { "Template Extensions" = "developer/template-extensions.md" },
  ] },
  { "Contributing" = "contributing.md" },
  { "Changelog" = "changelog.md" },
]

[project.theme]
features = [
  "content.action.edit",
  "content.action.view",
]

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.icon]
repo = "fontawesome/brands/github"
